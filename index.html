<style>
  :root {

    --orange: #f47c20; --cream: #fdf6ee; --brown: #3d2b1f;
    --shadow: 0 4px 20px rgba(13,140,122,0.13); --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 70%, var(--teal-light) 100%);
    padding: 22px 20px 18px; text-align: center; position: relative; overflow: hidden;
  }
  header::before { content: '🐾'; position: absolute; top:-10px; left:10px; font-size:80px; opacity:.10; transform:rotate(-20deg); }
  header::after  { content: '🐾'; position: absolute; bottom:-10px; right:10px; font-size:80px; opacity:.10; transform:rotate(15deg); }
  .logo { font-family: 'Fredoka One', cursive; font-size: clamp(26px,7vw,44px); color: white; text-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .logo span { color: #ffa040; }
  .logo-sub { color: rgba(255,255,255,.8); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .wa-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: #25d366; color: white; font-weight: 800; font-size: 14px;
    padding: 9px 20px; border-radius: 30px; text-decoration: none; margin-top: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,.25); transition: transform .2s;
  }
  .wa-btn:hover { transform: scale(1.05); }

  .filters-wrap {
    background: white; border-bottom: 3px solid var(--teal-light);
    padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 15px rgba(0,0,0,.07);
  }
  .search-bar {
    display: flex; align-items: center; background: var(--cream);
    border: 2px solid var(--teal-light); border-radius: 30px;
    padding: 8px 16px; margin-bottom: 11px; gap: 8px;
  }
  .search-bar input {
    border: none; background: transparent; font-family: 'Nunito', sans-serif;
    font-size: 15px; color: var(--brown); width: 100%; outline: none;
  }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--teal-dark); letter-spacing: 1px; white-space: nowrap; }
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 14px; border-radius: 20px; border: 2px solid var(--teal);
    background: transparent; color: var(--teal-dark); font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all .18s; white-space: nowrap;
  }
  .pill:hover, .pill.active { background: var(--teal); color: white; transform: scale(1.05); }

  .results-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 16px; font-size: 13px; color: #666; font-weight: 700;
  }
  .results-count { color: var(--teal-dark); }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
    gap: 14px; padding: 6px 16px 30px; max-width: 1200px; margin: 0 auto;
  }
  .card {
    background: white; border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); border: 2px solid transparent;
    transition: transform .2s, border-color .2s, box-shadow .2s; position: relative; overflow: hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--teal),var(--teal-light)); }
  .card:hover { transform: translateY(-3px); border-color: var(--teal-light); box-shadow: 0 8px 30px rgba(13,140,122,.2); }

  .badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800; text-transform:uppercase; padding:3px 10px; border-radius:10px; margin-bottom:8px; }
  .badge-perro { background:#e8f4fd; color:#1a6fa8; }
  .badge-gato  { background:#fce8fd; color:#8a1aa8; }
  .card-brand { font-size:11px; font-weight:800; color:var(--orange); text-transform:uppercase; letter-spacing:.5px; }
  .card-name  { font-size:14px; font-weight:700; color:var(--brown); line-height:1.3; margin:4px 0 8px; }
  .card-size  { display:inline-flex; align-items:center; gap:4px; background:var(--cream); border-radius:8px; padding:3px 10px; font-size:12px; font-weight:700; color:var(--teal-dark); margin-bottom:10px; }
  .card-price-row { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px dashed #e0e0e0; }
  .price-label { font-size:11px; color:#999; font-weight:600; }
  .price-value { font-family:'Fredoka One',cursive; font-size:22px; color:var(--teal-dark); }
  .wa-card-btn {
    display:flex; align-items:center; justify-content:center; gap:6px; width:100%;
    padding:9px; background:linear-gradient(135deg,#25d366,#1db954); color:white;
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13px;
    border:none; border-radius:12px; cursor:pointer; margin-top:12px;
    text-decoration:none; transition:transform .15s, box-shadow .15s;
  }
  .wa-card-btn:hover { transform:scale(1.02); box-shadow:0 4px 12px rgba(37,211,102,.4); }

  .empty { text-align:center; padding:60px 20px; color:#aaa; grid-column:1/-1; }
  .empty-icon { font-size:60px; margin-bottom:12px; }

  footer {
    background: var(--teal-dark); color: rgba(255,255,255,.7);
    text-align: center; padding: 18px; font-size: 12px;
  }
  footer strong { color: white; }
</style>
</head>

let currentEspecie = 'Todos';

function setFilter(especie, el) {
  currentEspecie = especie;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = PRODUCTS.filter(p => {
    if (currentEspecie !== 'Todos' && !p.especie.includes(currentEspecie)) return false;
    if (q && !p.producto.toLowerCase().includes(q) && !p.marca.toLowerCase().includes(q) && !p.size_label.toLowerCase().includes(q)) return false;
    return true;
  });
  renderProducts(filtered);
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent = list.length + ' producto' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🐾</div><h3>Sin resultados</h3><p>Probá con otra búsqueda o consultanos por WhatsApp</p></div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const badge = p.especie === 'Perro'
      ? '<span class="badge badge-perro">🐶 Perro</span>'
      : p.especie === 'Gato'
      ? '<span class="badge badge-gato">🐱 Gato</span>'
      : '<span class="badge badge-perro">🐾 Perro & Gato</span>';
    const msg = encodeURIComponent('Hola! Quisiera consultar sobre ' + p.producto + ' (' + p.size_label + ') - ' + fmt(p.precio_venta));
    return `
    <div class="card">
      ${badge}
      <div class="card-brand">${p.marca}</div>
      <div class="card-name">${p.producto}</div>
      <span class="card-size">⚖️ ${p.size_label}</span>
      <div class="card-price-row">
