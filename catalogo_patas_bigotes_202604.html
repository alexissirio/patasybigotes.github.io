<style>
  :root {
    --teal: #0d8c7a;
    --teal-light: #14b89e;
    --teal-dark: #07594d;
    --orange: #f47c20;
    --orange-light: #ffa040;
    --cream: #fdf6ee;
    --brown: #3d2b1f;
    --card-bg: #ffffff;
    --shadow: 0 4px 20px rgba(13,140,122,0.13);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 60%, var(--teal-light) 100%);
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🐾';
    position: absolute; top: -10px; left: 10px;
    font-size: 80px; opacity: 0.12; transform: rotate(-20deg);
  }
  header::after {
    content: '🐾';
    position: absolute; bottom: -10px; right: 10px;
    font-size: 80px; opacity: 0.12; transform: rotate(15deg);
  }
  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(28px, 7vw, 48px);
    color: white;
    letter-spacing: 1px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .logo-title span { color: var(--orange-light); }
  .logo-sub {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .whatsapp-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25d366;
    color: white;
    font-weight: 800;
    font-size: 15px;
    padding: 10px 22px;
    border-radius: 30px;
    text-decoration: none;
    margin-top: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .whatsapp-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.35); }

  /* FILTERS */
  .filters-wrap {
    background: white;
    border-bottom: 3px solid var(--teal-light);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--cream);
    border: 2px solid var(--teal-light);
    border-radius: 30px;
    padding: 8px 16px;
    margin-bottom: 12px;
    gap: 8px;
  }
  .search-bar input {
    border: none;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    color: var(--brown);
    width: 100%;
    outline: none;
  }
  .search-bar span { font-size: 18px; }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--teal-dark);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 14px;
    border-radius: 20px;
    border: 2px solid var(--teal);
    background: transparent;
    color: var(--teal-dark);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .pill:hover, .pill.active {
    background: var(--teal);
    color: white;
    transform: scale(1.05);
  }
  .pill.orange { border-color: var(--orange); color: var(--orange); }
  .pill.orange:hover, .pill.orange.active { background: var(--orange); color: white; }

  /* RESULTS BAR */
  .results-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    font-size: 13px;
    color: #666;
    font-weight: 700;
  }
  .results-count { color: var(--teal-dark); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 8px 16px 30px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* PRODUCT CARD */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--teal-light);
    box-shadow: 0 8px 30px rgba(13,140,122,0.2);
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .badge-perro { background: #e8f4fd; color: #1a6fa8; }
  .badge-gato { background: #fce8fd; color: #8a1aa8; }
  .badge-ambos { background: #e8fdf0; color: #1a8a4a; }

  .card-cat {
    font-size: 10px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .card-brand {
    font-size: 11px;
    font-weight: 800;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--brown);
    line-height: 1.3;
    margin: 4px 0 8px;
  }
  .card-size {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--cream);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--teal-dark);
    margin-bottom: 10px;
  }
  .card-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #e0e0e0;
  }
  .price-label { font-size: 11px; color: #999; font-weight: 600; }
  .price-value {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--teal-dark);
    letter-spacing: 0.5px;
  }
  .price-value small { font-size: 14px; }
  
  .wa-card-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px;
    background: linear-gradient(135deg, #25d366, #1db954);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 12px;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .wa-card-btn:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(37,211,102,0.4); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: #aaa; }
  .empty-icon { font-size: 60px; margin-bottom: 12px; }
  .empty h3 { font-size: 18px; color: #bbb; margin-bottom: 8px; }

    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 20px;
    font-size: 12px;
  }
  footer strong { color: white; }
</style>

const EMOJI_CAT = {
  'Alimento': '🍖',
  'Alimento Húmedo': '🥫',
  'Huesos y Snacks Naturales': '🦴',
  'Paños': '🧻',
  'Piedras Sanitarias': '🪨',
  'Piedras Silica': '💎',
  'Pipetas y Medicamentos': '💊',
  'Shampoo y Belleza': '🛁',
  'Snacks y Golosinas': '🍬'
};

let activeFilters = { especie: 'all', cat: 'all', marca: 'all' };

function initFilters() {
  const cats = ['all', ...new Set(PRODUCTS.map(p => p.categoria))].sort();
  const marcas = ['all', ...new Set(PRODUCTS.map(p => p.marca))].sort();

  const catContainer = document.getElementById('catFilters');
  catContainer.innerHTML = '';
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'pill orange' + (c === 'all' ? ' active' : '');
    btn.textContent = c === 'all' ? 'Todas' : (EMOJI_CAT[c] || '') + ' ' + c;
    btn.onclick = function() { setFilter('cat', c, this); };
    catContainer.appendChild(btn);
  });

  const marcaContainer = document.getElementById('marcaFilters');
  marcaContainer.innerHTML = '';
  marcas.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (m === 'all' ? ' active' : '');
    btn.textContent = m === 'all' ? 'Todas' : m;
    btn.onclick = function() { setFilter('marca', m, this); };
    marcaContainer.appendChild(btn);
  });
}

function setFilter(type, value, el) {
  activeFilters[type] = value;
  const parent = el.parentElement;
  parent.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = PRODUCTS.filter(p => {
    if (activeFilters.especie !== 'all' && !p.especie.includes(activeFilters.especie)) return false;
    if (activeFilters.cat !== 'all' && p.categoria !== activeFilters.cat) return false;
    if (activeFilters.marca !== 'all' && p.marca !== activeFilters.marca) return false;
    if (q && !p.producto.toLowerCase().includes(q) && !p.marca.toLowerCase().includes(q) && !p.size_label.toLowerCase().includes(q) && !p.categoria.toLowerCase().includes(q)) return false;
    return true;
  });
  renderProducts(filtered);
}

function formatPrice(n) {
  return '$' + n.toLocaleString('es-AR');
}

function especieBadge(e) {
  if (e === 'Perro') return '<span class="card-badge badge-perro">🐶 Perro</span>';
  if (e === 'Gato') return '<span class="card-badge badge-gato">🐱 Gato</span>';
  return '<span class="card-badge badge-ambos">🐾 Perro & Gato</span>';
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent = `${list.length} producto${list.length !== 1 ? 's' : ''} encontrado${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🐾</div><h3>No encontramos productos</h3><p>Probá con otros filtros o escribinos al WhatsApp</p></div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const msg = encodeURIComponent(`Hola! Quisiera consultar sobre ${p.producto} (${p.size_label}) - Precio: ${formatPrice(p.precio_venta)}`);
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        ${especieBadge(p.especie)}
        
      </div>
      <div class="card-cat">${EMOJI_CAT[p.categoria] || ''} ${p.categoria}</div>
      <div class="card-brand">${p.marca}</div>
      <div class="card-name">${p.producto}</div>
      <span class="card-size">⚖️ ${p.size_label}</span>
      <div class="card-price-row">
        <div>
          <div class="price-label">Precio de venta</div>
          <div class="price-value">${formatPrice(p.precio_venta)}</div>
        </div>
      </div>
      <a class="wa-card-btn" href="https://wa.me/541158775681?text=${msg}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Consultar por WhatsApp
      </a>
    </div>`;
  }).join('');
}

initFilters();
applyFilters();
</script>
